name: Keep Streamlit App Alive

on:
  schedule:
    # 這裡設定每兩天的早上 8 點 (UTC時間 0 點) 自動執行一次
    - cron: "0 0 */2 * *" 
  workflow_dispatch: # 讓你可以手動點擊測試

jobs:
  ping-app:
    runs-on: ubuntu-latest
    steps:
      - name: 戳醒 Streamlit 網頁
        # 👇 請把下方的網址換成你真實的 Streamlit App 網址！
        run: |
          curl -s https://mystocktracker-system.streamlit.app/_stcore/health
